<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tunapee</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="line"></div>
  <div id="line2"></div>
  <div id="line3"></div>
  <div id="line4"></div>

  <div id="content">
    <div class="about-block">
      <p class="work-back"><a href="/blog">← blog</a></p>
      <div id="work-content"><p style="opacity:0.4">loading...</p></div>
    </div>
  </div>

  <div id="side-panel">
    <div id="side-art-box"><img id="side-art" src="/assets/ascii-art.png" alt=""></div>
    <div id="side-info-box">
      <p>location: brooklyn, nyc</p>
      <p>time: <span id="side-time">--:--</span></p>
      <p>temperature: <span id="side-temp">--</span></p>
    </div>
  </div>

  <nav id="fixed-nav">
    <a href="/" class="nav-link" data-label="home">home</a>
    <a href="/about" class="nav-link" data-label="about">about</a>
    <a href="/works" class="nav-link" data-label="works">works</a>
    <a href="/blog" class="nav-link" data-label="blog">blog</a>
    <a href="/now" class="nav-link" data-label="now">now</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/script.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    function parseFrontmatter(text) {
      const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
      if (!match) return { meta: {}, body: text };
      const meta = {};
      match[1].split('\n').forEach(line => {
        const colonIdx = line.indexOf(':');
        if (colonIdx > 0) {
          meta[line.slice(0, colonIdx).trim()] = line.slice(colonIdx + 1).trim();
        }
      });
      return { meta, body: match[2] };
    }

    if (!slug) {
      document.getElementById('work-content').innerHTML = '<p>no post specified.</p>';
    } else {
      fetch('/blog.json')
        .then(r => r.json())
        .then(posts => {
          const post = posts.find(p => p.slug === slug);
          if (!post) throw new Error('not found');
          return fetch('/blog/' + encodeURIComponent(post.file))
            .then(r => {
              if (!r.ok) throw new Error('not found');
              return r.text();
            })
            .then(raw => {
              const { meta, body } = parseFrontmatter(raw);
              const title = meta.title || post.title;
              const date = post.date;
              const tagsHtml = post.tags && post.tags.length
                ? `<span class="blog-tag">${post.tags.join(', ')}</span>`
                : '';

              const html = marked.parse(body);
              const container = document.getElementById('work-content');
              container.innerHTML = `
                <h1>${title}</h1>
                <div class="post-meta-row">
                  <span class="now-meta">${date}</span>
                  ${tagsHtml ? `<span class="post-tags">${tagsHtml}</span>` : ''}
                </div>
                ${html}
              `;

              document.title = `${title} — tunapee`;
            });
        })
        .catch(() => {
          document.getElementById('work-content').innerHTML = '<p>post not found.</p>';
        });
    }
  </script>
</body>
</html>
