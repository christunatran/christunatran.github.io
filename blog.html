<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tunapee</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="line"></div>
  <div id="line2"></div>
  <div id="line3"></div>
  <div id="line4"></div>

  <div id="content">
    <div id="blogGrid"></div>
  </div>

  <div id="side-panel">
    <div id="side-art-box"><img id="side-art" src="assets/ascii-art.png" alt=""></div>
    <div id="side-info-box">
      <p>location: brooklyn, nyc</p>
      <p>time: <span id="side-time">--:--</span></p>
      <p>temperature: <span id="side-temp">--</span></p>
    </div>
  </div>

  <nav id="fixed-nav">
    <a href="index.html" class="nav-link" data-label="home">home</a>
    <a href="about.html" class="nav-link" data-label="about">about</a>
    <a href="works.html" class="nav-link" data-label="works">works</a>
    <a href="blog.html" class="nav-link" data-label="blog">blog</a>
    <a href="now.html" class="nav-link" data-label="now">now</a>
  </nav>

  <script src="script.js"></script>
  <script>
    fetch('blog.json')
      .then(r => r.json())
      .then(posts => {
        const grid = document.getElementById('blogGrid');
        posts.forEach(post => {
          const card = document.createElement('div');
          card.className = 'post post-text';
          const tagsHtml = post.tags && post.tags.length
            ? `<span class="blog-tag">${post.tags.join(', ')}</span>`
            : '';
          card.innerHTML = `
            <div class="post-content">
              <p class="blog-card-title">${post.title}</p>
              ${post.snippet ? `<p class="blog-card-snippet">${post.snippet}</p>` : ''}
            </div>
            <div class="post-footer">
              <span class="post-tags">${tagsHtml}</span>
              <span class="post-date">${post.date}</span>
            </div>
          `;
          card.addEventListener('click', () => {
            window.location.href = `blog-post.html?slug=${post.slug}`;
          });
          grid.appendChild(card);
        });
      });
  </script>
</body>
</html>
