<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>work — your name</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="line"></div>
  <div id="line2"></div>
  <div id="line3"></div>
  <div id="line4"></div>

  <div id="content">
    <div class="about-block">
      <p class="work-back"><a href="works.html">← works</a></p>
      <div id="work-content"><p style="opacity:0.4">loading...</p></div>
    </div>
  </div>

  <div id="side-panel">
    <div id="side-art-box"><img id="side-art" src="assets/ascii-art.png" alt=""></div>
    <div id="side-info-box">
      <p>location: brooklyn, nyc</p>
      <p>time: <span id="side-time">--:--</span></p>
      <p>temperature: <span id="side-temp">--</span></p>
    </div>
  </div>

<nav id="fixed-nav">
    <a href="index.html" class="nav-link" data-label="home">home</a>
    <a href="about.html" class="nav-link" data-label="about">about</a>
    <a href="works.html" class="nav-link" data-label="works">works</a>
    <a href="blog.html" class="nav-link" data-label="blog">blog</a>
    <a href="now.html" class="nav-link" data-label="now">now</a>
  </nav>

  <!-- GLightbox -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">

  <!-- marked.js for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script src="script.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    if (!slug) {
      document.getElementById('work-content').innerHTML = '<p>no work specified.</p>';
    } else {
      fetch(`works/${slug}/index.md`)
        .then(r => {
          if (!r.ok) throw new Error('not found');
          return r.text();
        })
        .then(md => {
          // Rewrite relative asset paths to be relative to the root
          md = md.replace(/\((?!https?:\/\/)(assets\/[^)]+)\)/g, `(works/${slug}/$1)`);

          const html = marked.parse(md);
          const container = document.getElementById('work-content');
          container.innerHTML = html;

          // Convert .mov/.mp4 links or images to <video> elements
          container.querySelectorAll('a, img').forEach(el => {
            const src = el.tagName === 'A' ? el.href : el.src;
            if (/\.(mov|mp4|MOV|MP4)$/.test(src)) {
              const video = document.createElement('video');
              video.src = src;
              video.controls = true;
              el.replaceWith(video);
            }
          });

          // Auto-grid consecutive images
          (function autoGridImages() {
            const children = Array.from(container.children);
            let i = 0;
            while (i < children.length) {
              const el = children[i];
              if (el.tagName === 'P' && el.children.length === 1 && el.children[0].tagName === 'IMG') {
                let run = [el];
                let j = i + 1;
                while (j < children.length) {
                  const next = children[j];
                  if (next.tagName === 'P' && next.children.length === 1 && next.children[0].tagName === 'IMG') {
                    run.push(next);
                    j++;
                  } else break;
                }
                if (run.length >= 2) {
                  for (let k = 0; k < run.length; ) {
                    const chunk = run.slice(k, k + 4);
                    const grid = document.createElement('div');
                    grid.className = `img-grid img-grid--${chunk.length}`;
                    chunk[0].parentNode.insertBefore(grid, chunk[0]);
                    chunk.forEach(p => grid.appendChild(p.children[0]));
                    chunk.forEach(p => p.remove());
                    k += 4;
                  }
                }
                i = j;
              } else {
                i++;
              }
            }
          })();

          // Lightbox via GLightbox
          const glightboxElements = Array.from(container.querySelectorAll('img')).map(img => ({
            href: img.src,
            type: 'image'
          }));

          const lb = GLightbox({ elements: glightboxElements, touchNavigation: true });

          container.querySelectorAll('img').forEach((img, i) => {
            img.style.cursor = 'pointer';
            img.addEventListener('click', () => lb.openAt(i));
          });

          // Update page title
          const h1 = container.querySelector('h1');
          if (h1) document.title = `${h1.textContent.toLowerCase()} — your name`;
        })
        .catch(() => {
          document.getElementById('work-content').innerHTML = '<p>work not found.</p>';
        });
    }
  </script>
</body>
</html>
